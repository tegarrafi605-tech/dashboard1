<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISA - Eksplorasi Dataset</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

    <main class="flex-1 p-6 md:p-10 max-w-[1400px] mx-auto w-full flex flex-col gap-8">
        
        <!-- HEADER ROW: TITLE & DUAL-DROPDOWN -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-white flex items-center gap-3">
                    <i data-lucide="database" class="w-8 h-8 text-purple-500"></i> Eksplorasi Dataset
                </h1>
                <p class="text-gray-400 mt-2 text-sm" id="subtitleText">Memuat engine data...</p>
            </div>
            
            <div class="flex items-center gap-3 bg-gray-900/50 p-2 rounded-xl border border-gray-800">
                <div class="flex flex-col">
                    <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 mb-1">Sumber Data</label>
                    <select id="sumberData" onchange="fetchData()" class="bg-gray-800 text-white text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 block w-48 p-2.5 outline-none border border-gray-700 cursor-pointer transition hover:bg-gray-700">
                        <option value="DATA PISA MATEMATIKA1.xlsx">Matematika</option>
                        <option value="3rlyb8.xlsx">Sains</option>
                        <option value="toyp15.xlsx">Literasi</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 mb-1">Tahun</label>
                    <select id="tahunData" onchange="processWorkbook()" class="bg-gray-800 text-white text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 block w-32 p-2.5 outline-none border border-gray-700 cursor-pointer transition hover:bg-gray-700">
                        <option value="2022">2022</option>
                        <option value="2018">2018</option>
                        <option value="2015">2015</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- LOADING INDICATOR -->
        <div id="loadingIndicator" class="hidden flex-col items-center justify-center py-20">
            <i data-lucide="loader-2" class="w-10 h-10 text-purple-500 animate-spin mb-4"></i>
            <p class="text-gray-400 font-medium tracking-wide animate-pulse">Menarik & Membersihkan Data...</p>
        </div>

        <!-- DASHBOARD CONTENT -->
        <div id="dashboardContent" class="hidden flex-col gap-8">
            
            <!-- CHARTS SECTION -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Line Chart -->
                <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-lg">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i data-lucide="trending-up" class="w-4 h-4 text-purple-400"></i> Tren Skor (Top 10)
                    </h3>
                    <div class="w-full h-64"><canvas id="lineChart"></canvas></div>
                </div>
                <!-- Pie Chart -->
                <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-lg">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i data-lucide="pie-chart" class="w-4 h-4 text-blue-400"></i> Distribusi Top 5 Negara
                    </h3>
                    <div class="w-full h-64"><canvas id="pieChart"></canvas></div>
                </div>
            </div>

            <!-- TABLE SECTION -->
            <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden shadow-xl flex flex-col relative">
                <div class="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                    <i data-lucide="table" class="w-32 h-32"></i>
                </div>
                <div class="overflow-x-auto max-h-[600px] overflow-y-auto z-10">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-gray-950/80 backdrop-blur-md text-gray-400 text-xs uppercase sticky top-0 z-20 shadow-md border-b border-gray-800" id="tableHead">
                            <!-- Generated -->
                        </thead>
                        <tbody class="text-sm divide-y divide-gray-800/60" id="tableBody">
                            <!-- Generated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        let workbookCache = null;
        let currentFileName = null;
        let targetMetricCol = null;
        let maxValueGlobal = 0;
        let cLine = null;
        let cPie = null;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchData();
        });

        async function fetchData() {
            const fileName = document.getElementById('sumberData').value;
            
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('loadingIndicator').classList.add('flex');
            document.getElementById('dashboardContent').classList.add('hidden');

            try {
                // Fetch only if file changed
                if(currentFileName !== fileName || !workbookCache) {
                    const response = await fetch(fileName);
                    if (!response.ok) throw new Error("File tidak ditemukan");
                    const arrayBuffer = await response.arrayBuffer();
                    workbookCache = XLSX.read(arrayBuffer, { type: 'array' });
                    currentFileName = fileName;
                }
                
                processWorkbook();

            } catch(e) {
                console.error(e);
                alert("Gagal memuat " + fileName + ". Pastikan file Excel tersedia.");
                document.getElementById('loadingIndicator').classList.remove('flex');
                document.getElementById('loadingIndicator').classList.add('hidden');
            }
        }

        function processWorkbook() {
            if(!workbookCache) return;
            const targetYear = document.getElementById('tahunData').value;
            const categoryName = document.getElementById('sumberData').options[document.getElementById('sumberData').selectedIndex].text;
            
            // 1. Kumpulkan semua sheet yang valid (yang memiliki data angka riil)
            let validSheets = [];
            for(let i=0; i<workbookCache.SheetNames.length; i++) {
                let sName = workbookCache.SheetNames[i];
                if(sName.toLowerCase() === 'toc' || sName.toLowerCase() === 'cover') continue;

                let worksheet = workbookCache.Sheets[sName];
                let raw = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                
                let hasNumbers = false;
                // Cek cepat 20 baris pertama apakah ada angka
                for(let j=0; j<Math.min(20, raw.length); j++) {
                    let keys = Object.keys(raw[j]);
                    for(let k of keys) {
                        if(typeof raw[j][k] === 'number') {
                            hasNumbers = true;
                            break;
                        }
                    }
                    if(hasNumbers) break;
                }
                
                if(hasNumbers) {
                    validSheets.push(sName);
                }
            }

            // 2. Trik Pemetaan Tahun ke Urutan Sheet (Persis seperti web Piyalyze)
            // Asumsi bawaan: 2022 = Sheet 1, 2018 = Sheet 2, 2015 = Sheet 3
            let selectedSheet = null;
            if(targetYear === "2022" && validSheets.length > 0) selectedSheet = validSheets[0];
            else if(targetYear === "2018" && validSheets.length > 1) selectedSheet = validSheets[1];
            else if(targetYear === "2015" && validSheets.length > 2) selectedSheet = validSheets[2];

            // 3. Fallback Cerdas: Jika trik urutan gagal (misal file hanya punya 1 sheet), 
            // coba cari apakah ada sheet yang namanya memuat angka tahun tersebut
            if(!selectedSheet) {
                for(let i=0; i<validSheets.length; i++) {
                    if(validSheets[i].includes(targetYear)) {
                        selectedSheet = validSheets[i];
                        break;
                    }
                }
            }

            // Jika benar-benar tidak ditemukan baik dari urutan maupun nama
            if(!selectedSheet) {
                alert(`Data untuk tahun ${targetYear} tidak ditemukan di dalam file ${categoryName}.`);
                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('dashboardContent').classList.add('hidden');
                document.getElementById('subtitleText').innerHTML = `<span class="text-red-400">Data Tahun ${targetYear} tidak tersedia.</span>`;
                return;
            }

            document.getElementById('subtitleText').innerHTML = `Menampilkan data <span class="font-bold text-white">${categoryName}</span> dari File: <span class="text-purple-400 font-mono">${categoryName}</span>`;

            const worksheet = workbookCache.Sheets[selectedSheet];
            let rawData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

            // Detect Metric Column
            targetMetricCol = null;
            if(rawData.length > 0) {
                const keys = Object.keys(rawData[0]);
                let scoresByCol = {};
                keys.forEach(k => scoresByCol[k] = 0);
                rawData.forEach(row => {
                    keys.forEach(k => {
                        if (!isNaN(parseFloat(row[k])) && String(row[k]).trim() !== "") scoresByCol[k]++;
                    });
                });
                let maxN = 0;
                keys.forEach(k => {
                    if (scoresByCol[k] > maxN) {
                        maxN = scoresByCol[k];
                        targetMetricCol = k;
                    }
                });
            }

            // STRICT GARBAGE FILTERING
            let cleanData = [];
            if(rawData.length > 0 && targetMetricCol) {
                const countryKey = Object.keys(rawData[0])[0];
                cleanData = rawData.filter(row => {
                    const countryVal = String(row[countryKey] || '').trim();
                    const valL = countryVal.toLowerCase();
                    
                    if(!countryVal || valL === 'undefined' || valL === 'null') return false;
                    
                    // Filter kata sampah
                    const garbages = ['table', 'toc', 'note', 'figure', 'empty', 'unknown', 'oecd average', 'oecd', 'partners', 'mean'];
                    if(garbages.some(g => valL.includes(g))) return false;
                    if(countryVal.length > 40) return false;

                    // Harus ada angka valid di skor
                    const metricVal = row[targetMetricCol];
                    if(metricVal === "" || isNaN(parseFloat(metricVal))) return false;
                    
                    return true;
                });
            }

            // Sort Descending by default
            cleanData.sort((a, b) => parseFloat(b[targetMetricCol]) - parseFloat(a[targetMetricCol]));

            // Max Value for progress bar
            maxValueGlobal = 0;
            if(cleanData.length > 0) {
                maxValueGlobal = parseFloat(cleanData[0][targetMetricCol]);
            }

            renderCharts(cleanData);
            renderTable(cleanData);

            document.getElementById('loadingIndicator').classList.remove('flex');
            document.getElementById('loadingIndicator').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');
            document.getElementById('dashboardContent').classList.add('flex');
        }

        function formatNumber(num) {
            if(typeof num !== 'number') return num;
            return (num % 1 !== 0) ? num.toFixed(1) : num;
        }

        function renderCharts(data) {
            if(cLine) cLine.destroy();
            if(cPie) cPie.destroy();

            if(data.length === 0 || !targetMetricCol) return;

            const countryKey = Object.keys(data[0])[0];
            const top10 = data.slice(0, 10);
            const top5 = data.slice(0, 5);

            const labels10 = top10.map(r => r[countryKey]);
            const vals10 = top10.map(r => parseFloat(r[targetMetricCol]));

            const labels5 = top5.map(r => r[countryKey]);
            const vals5 = top5.map(r => parseFloat(r[targetMetricCol]));

            // LINE CHART
            const ctxL = document.getElementById('lineChart').getContext('2d');
            
            let gradL = ctxL.createLinearGradient(0, 0, 0, 400);
            gradL.addColorStop(0, 'rgba(168, 85, 247, 0.4)');
            gradL.addColorStop(1, 'rgba(168, 85, 247, 0)');

            cLine = new Chart(ctxL, {
                type: 'line',
                data: {
                    labels: labels10,
                    datasets: [{
                        label: 'Skor',
                        data: vals10,
                        borderColor: '#a855f7', // purple-500
                        backgroundColor: gradL,
                        borderWidth: 3,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#a855f7',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } },
                        x: { grid: { display: false }, ticks: { color: '#9ca3af', maxRotation: 45, minRotation: 45 } }
                    }
                }
            });

            // PIE CHART
            const ctxP = document.getElementById('pieChart').getContext('2d');
            cPie = new Chart(ctxP, {
                type: 'doughnut',
                data: {
                    labels: labels5,
                    datasets: [{
                        data: vals5,
                        backgroundColor: ['#a855f7', '#8b5cf6', '#6366f1', '#3b82f6', '#0ea5e9'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: { position: 'right', labels: { color: '#d1d5db', usePointStyle: true, boxWidth: 8 } }
                    }
                }
            });
        }

        function renderTable(data) {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            thead.innerHTML = ''; tbody.innerHTML = '';

            if(data.length === 0) return;

            const allKeys = Object.keys(data[0]);
            const keys = allKeys.filter(k => data.some(row => row[k] !== undefined && row[k] !== ""));

            // Hitung nilai maksimum tiap kolom untuk kalkulasi persentase bar
            let maxVals = {};
            keys.forEach(k => {
                maxVals[k] = 0;
                data.forEach(row => {
                    let val = parseFloat(row[k]);
                    if(!isNaN(val) && val > maxVals[k]) maxVals[k] = val;
                });
            });

            // Palet warna untuk progress bar (Berganti warna tiap kolom)
            const barColors = ['bg-purple-500', 'bg-pink-500', 'bg-blue-500', 'bg-emerald-500', 'bg-amber-500'];
            let numColIndex = 0;
            let colColorMap = {};

            const trH = document.createElement('tr');
            keys.forEach((k, idx) => {
                const th = document.createElement('th');
                th.className = 'p-5 font-bold tracking-wider text-indigo-200/70 text-xs uppercase';
                
                // Override nama kolom khusus sesuai permintaan
                let headerName = k;
                if(idx === 1) headerName = "MATEMATIKA";
                else if(idx === 2) headerName = "SAINS";
                else if(idx === 3) headerName = "LITERASI";
                else if(idx === 0) headerName = "NEGARA";

                th.textContent = headerName;
                trH.appendChild(th);
                
                // Petakan warna jika kolom ini berisi angka
                if(idx > 0 && maxVals[k] > 0) {
                    colColorMap[k] = barColors[numColIndex % barColors.length];
                    numColIndex++;
                }
            });
            thead.appendChild(trH);

            data.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-800/40 transition relative border-b border-gray-800/50';

                keys.forEach(key => {
                    const td = document.createElement('td');
                    td.className = 'p-5 relative z-10';

                    let rawVal = row[key];
                    let displayVal = rawVal;
                    let isNumeric = false;
                    let numVal = 0;

                    if (typeof rawVal === 'number') { displayVal = formatNumber(rawVal); isNumeric = true; numVal = rawVal; }
                    else if (typeof rawVal === 'string' && !isNaN(parseFloat(rawVal)) && rawVal.trim()!=='') {
                        let parsed = parseFloat(rawVal);
                        if (!isNaN(parsed)) { displayVal = formatNumber(parsed); isNumeric = true; numVal = parsed; }
                    }

                    // Tambahkan simbol % secara pintar jika ada indikasi persen di header
                    if(isNumeric && String(displayVal).indexOf('%') === -1 && (key.toLowerCase().includes('%') || key.toLowerCase().includes('persen'))) {
                        displayVal = displayVal + '%';
                    }

                    // Kolom Pertama: Nama Negara + Medali di Kiri
                    if(key === keys[0]) {
                        let medal = '';
                        if(idx === 0) medal = '<i data-lucide="medal" class="w-5 h-5 text-yellow-500 mr-3"></i>';
                        else if(idx === 1) medal = '<i data-lucide="medal" class="w-5 h-5 text-gray-400 mr-3"></i>';
                        else if(idx === 2) medal = '<i data-lucide="medal" class="w-5 h-5 text-amber-600 mr-3"></i>';
                        else medal = '<div class="w-5 h-5 mr-3 inline-block"></div>'; // Spacer agar teks sejajar rapi
                        
                        td.innerHTML = `<div class="flex items-center"><span class="font-extrabold text-white flex items-center">${medal} ${displayVal}</span></div>`;
                    }
                    // Kolom Angka: Angka + Inline Progress Bar
                    else if(isNumeric && maxVals[key] > 0) {
                        const percent = Math.min(100, Math.max(0, (numVal / maxVals[key]) * 100));
                        const barColor = colColorMap[key];
                        
                        td.innerHTML = `
                            <div class="flex items-center gap-3">
                                <span class="font-bold text-white text-base w-16">${displayVal}</span>
                                <div class="w-24 h-2 bg-gray-800 rounded-full overflow-hidden flex-shrink-0">
                                    <div class="h-full ${barColor} rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Kolom Teks Biasa
                        td.innerHTML = `<span class="font-bold text-gray-400">${displayVal}</span>`;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
