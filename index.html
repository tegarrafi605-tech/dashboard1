<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISA Educational Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col h-screen overflow-hidden">

    <!-- TOPBAR -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center z-10 flex-shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-400 flex items-center gap-2">
                <i data-lucide="layout-dashboard"></i> PISA-DB
            </h1>
            <div class="h-6 w-px bg-gray-600 mx-2"></div>
            <!-- DROPDOWN SHEET -->
            <div class="flex items-center gap-2">
                <label for="sheetSelector" class="text-sm text-gray-400">Pilih Sheet:</label>
                <select id="sheetSelector" onchange="changeSheet()" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-64 p-2 outline-none">
                    <option value="">Memuat data...</option>
                </select>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative w-64">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </span>
                <input type="text" id="searchInput" oninput="applyFiltersAndSort()" placeholder="Cari instan (real-time)..." 
                       class="w-full bg-gray-700 border-none rounded-lg py-2 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 text-sm outline-none text-white transition">
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-y-auto p-6 space-y-6">
        
        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="flex flex-col items-center justify-center p-10 hidden">
            <i data-lucide="loader-2" class="w-10 h-10 text-blue-500 animate-spin mb-4"></i>
            <p class="text-gray-400">Memuat dan memproses file Excel...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-lg hidden">
            <h3 class="font-bold flex items-center gap-2"><i data-lucide="alert-triangle"></i> Gagal Memuat Data</h3>
            <p class="text-sm mt-1" id="errorText">Pastikan file 'DATA PISA MATEMATIKA1.xlsx' ada di folder yang sama.</p>
        </div>

        <!-- DASHBOARD CONTENT -->
        <div id="dashboardContent" class="hidden flex-col gap-6">
            
            <!-- SUMMARY CARDS -->
            <div id="summaryCards" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                    <h4 class="text-sm font-semibold text-gray-400 mb-2 flex items-center gap-2"><i data-lucide="trending-up" class="w-4 h-4"></i> Skor Tertinggi</h4>
                    <div class="text-3xl font-bold text-green-400" id="statHigh">-</div>
                </div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                    <h4 class="text-sm font-semibold text-gray-400 mb-2 flex items-center gap-2"><i data-lucide="trending-down" class="w-4 h-4"></i> Skor Terendah</h4>
                    <div class="text-3xl font-bold text-red-400" id="statLow">-</div>
                </div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                    <h4 class="text-sm font-semibold text-gray-400 mb-2 flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4"></i> Rata-Rata</h4>
                    <div class="text-3xl font-bold text-blue-400" id="statAvg">-</div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-2" class="text-purple-400"></i> Visualisasi Data (Top 10)
                </h3>
                <div class="w-full h-64">
                    <canvas id="dynamicChart"></canvas>
                </div>
            </div>

            <!-- DYNAMIC TABLE -->
            <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-lg flex flex-col">
                <div class="p-4 border-b border-gray-700 bg-gray-800 flex justify-between items-center">
                    <h3 class="text-lg font-semibold" id="tableTitle">Data Tabel</h3>
                </div>
                <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-gray-700 text-gray-300 text-xs uppercase sticky top-0 z-10 shadow-md" id="tableHead">
                            <!-- Header generated dynamically -->
                        </thead>
                        <tbody class="text-sm divide-y divide-gray-700" id="tableBody">
                            <!-- Data generated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let workbook = null;
        let currentData = [];
        let myChart = null;
        
        // State for sorting
        let currentSortCol = null;
        let currentSortAsc = true;

        async function init() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('dashboardContent').classList.add('hidden');
            document.getElementById('errorMessage').classList.add('hidden');

            try {
                const response = await fetch('DATA PISA MATEMATIKA1.xlsx');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const arrayBuffer = await response.arrayBuffer();
                workbook = XLSX.read(arrayBuffer, { type: 'array' });
                
                const selector = document.getElementById('sheetSelector');
                selector.innerHTML = ''; 
                
                workbook.SheetNames.forEach((sheetName) => {
                    const option = document.createElement('option');
                    option.value = sheetName;
                    option.textContent = sheetName;
                    selector.appendChild(option);
                });

                if(workbook.SheetNames.length > 0) {
                    changeSheet();
                }

                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
                document.getElementById('dashboardContent').classList.add('flex');

            } catch (error) {
                console.error("Error loading excel:", error);
                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorText').innerText = "Gagal memuat file 'DATA PISA MATEMATIKA1.xlsx'. Pastikan file sudah berada di GitHub / Folder yang sama. (Error: " + error.message + ")";
            }
        }

        function changeSheet() {
            const sheetName = document.getElementById('sheetSelector').value;
            if(!sheetName || !workbook) return;

            document.getElementById('tableTitle').innerText = `Data Sheet: ${sheetName}`;
            
            const worksheet = workbook.Sheets[sheetName];
            let rawData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
            
            // 5. Hapus Baris Kosong (Jika kolom pertama kosong)
            if(rawData.length > 0) {
                const firstKey = Object.keys(rawData[0])[0];
                currentData = rawData.filter(row => {
                    const val = String(row[firstKey]).trim();
                    return val !== "" && val.toLowerCase() !== "empty" && val !== "undefined";
                });
            } else {
                currentData = [];
            }
            
            // Reset sort when changing sheet
            currentSortCol = null;
            currentSortAsc = true;
            document.getElementById('searchInput').value = '';

            updateSummaryCards(currentData);
            applyFiltersAndSort();
            renderChart(currentData);
        }

        // 4. Summary Cards Calculation
        function updateSummaryCards(data) {
            const statHigh = document.getElementById('statHigh');
            const statLow = document.getElementById('statLow');
            const statAvg = document.getElementById('statAvg');

            if(data.length === 0) {
                statHigh.innerText = '-';
                statLow.innerText = '-';
                statAvg.innerText = '-';
                return;
            }

            // Cari kolom angka pertama untuk dijadikan patokan metrik
            const keys = Object.keys(data[0]);
            let targetKey = null;
            for(let key of keys) {
                const isNumeric = data.some(row => typeof row[key] === 'number' || (!isNaN(parseFloat(row[key])) && row[key] !== ""));
                if(isNumeric) {
                    targetKey = key;
                    break;
                }
            }

            if(!targetKey) {
                statHigh.innerText = 'N/A';
                statLow.innerText = 'N/A';
                statAvg.innerText = 'N/A';
                return;
            }

            let max = -Infinity;
            let min = Infinity;
            let sum = 0;
            let count = 0;

            data.forEach(row => {
                let val = parseFloat(row[targetKey]);
                if(!isNaN(val)) {
                    if(val > max) max = val;
                    if(val < min) min = val;
                    sum += val;
                    count++;
                }
            });

            if(count > 0) {
                const avg = sum / count;
                // 1. Pembulatan Angka (1 angka di belakang koma)
                statHigh.innerText = formatNumber(max);
                statLow.innerText = formatNumber(min);
                statAvg.innerText = formatNumber(avg);
            } else {
                statHigh.innerText = '-';
                statLow.innerText = '-';
                statAvg.innerText = '-';
            }
        }

        // 1. Pembulatan 1 desimal
        function formatNumber(num) {
            if(typeof num !== 'number') return num;
            return (num % 1 !== 0) ? num.toFixed(1) : num;
        }

        // 2 & 3. Search Pintar dan Sorting Otomatis
        function applyFiltersAndSort() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filteredData = currentData;

            // Apply Search Filter (Real-time)
            if(query) {
                filteredData = currentData.filter(row => {
                    return Object.values(row).some(val => String(val).toLowerCase().includes(query));
                });
            }

            // Apply Sorting
            if(currentSortCol) {
                filteredData.sort((a, b) => {
                    let valA = a[currentSortCol];
                    let valB = b[currentSortCol];

                    // Sort numeric if both are numbers
                    let numA = parseFloat(valA);
                    let numB = parseFloat(valB);
                    if(!isNaN(numA) && !isNaN(numB) && valA !== "" && valB !== "") {
                        return currentSortAsc ? numA - numB : numB - numA;
                    }

                    // String sorting
                    valA = String(valA || '').toLowerCase();
                    valB = String(valB || '').toLowerCase();
                    if (valA < valB) return currentSortAsc ? -1 : 1;
                    if (valA > valB) return currentSortAsc ? 1 : -1;
                    return 0;
                });
            }

            renderTableHTML(filteredData);
        }

        function renderTableHTML(data) {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            
            thead.innerHTML = '';
            tbody.innerHTML = '';

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td class="p-4 text-center text-gray-400" colspan="100%">Tidak ada data yang cocok.</td></tr>';
                return;
            }

            const keys = Object.keys(data[0]);
            const trHead = document.createElement('tr');
            
            // Generate Headers with Sorting Logic
            keys.forEach(key => {
                const th = document.createElement('th');
                th.className = 'p-4 font-semibold tracking-wide cursor-pointer hover:text-white hover:bg-gray-600 transition group select-none';
                
                const flexDiv = document.createElement('div');
                flexDiv.className = 'flex items-center gap-1';
                
                const span = document.createElement('span');
                span.textContent = key;
                flexDiv.appendChild(span);

                // Sorting Icons
                if (currentSortCol === key) {
                    const icon = document.createElement('i');
                    icon.setAttribute('data-lucide', currentSortAsc ? 'chevron-up' : 'chevron-down');
                    icon.className = 'w-4 h-4 text-blue-400';
                    flexDiv.appendChild(icon);
                } else {
                    const icon = document.createElement('i');
                    icon.setAttribute('data-lucide', 'chevrons-up-down');
                    icon.className = 'w-4 h-4 text-gray-500 opacity-0 group-hover:opacity-100 transition';
                    flexDiv.appendChild(icon);
                }

                th.appendChild(flexDiv);

                // Click event for sorting
                th.onclick = () => {
                    if (currentSortCol === key) {
                        currentSortAsc = !currentSortAsc; // toggle
                    } else {
                        currentSortCol = key;
                        currentSortAsc = true; // default ascending
                    }
                    applyFiltersAndSort();
                };

                trHead.appendChild(th);
            });
            thead.appendChild(trHead);

            // Generate Rows
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-700/50 transition';
                keys.forEach(key => {
                    const td = document.createElement('td');
                    td.className = 'p-4';
                    
                    // 1. Pembulatan Angka saat rendering
                    let val = row[key];
                    if (typeof val === 'number') {
                        val = formatNumber(val);
                    } else if (typeof val === 'string' && val.trim() !== '' && !isNaN(val)) {
                        let parsed = parseFloat(val);
                        if (!isNaN(parsed)) val = formatNumber(parsed);
                    }
                    
                    td.textContent = val;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            lucide.createIcons();
        }

        function renderChart(data) {
            if(myChart) myChart.destroy();
            if(data.length === 0) return;

            const keys = Object.keys(data[0]);
            let labelKey = keys[0]; 
            let dataKeys = [];

            keys.forEach(key => {
                if(typeof data[0][key] === 'number') {
                    dataKeys.push(key);
                }
            });

            if (dataKeys.length === 0 && data.length > 0) {
                keys.forEach(key => {
                     const val = parseFloat(data[0][key]);
                     if(!isNaN(val)) dataKeys.push(key);
                });
            }

            const chartData = data.slice(0, 10);
            const labels = chartData.map(row => row[labelKey] || 'Unknown');
            
            const datasets = [];
            const colors = ['#60a5fa', '#f87171', '#34d399', '#fbbf24', '#a78bfa'];

            if (dataKeys.length > 0) {
                dataKeys.slice(0, 3).forEach((key, index) => {
                    datasets.push({
                        label: key,
                        data: chartData.map(row => parseFloat(row[key]) || 0),
                        backgroundColor: colors[index % colors.length],
                        borderColor: colors[index % colors.length],
                        borderWidth: 1
                    });
                });
            } else {
                datasets.push({
                    label: 'Tidak ada metrik angka',
                    data: chartData.map(() => 0)
                });
            }

            const ctx = document.getElementById('dynamicChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#9ca3af' } }
                    },
                    scales: {
                        y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } },
                        x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                    }
                }
            });
        }

        // Run
        init();
        lucide.createIcons();
    </script>
</body>
</html>
