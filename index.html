<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISA Educational Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col h-screen overflow-hidden">

    <!-- TOPBAR -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center z-10 flex-shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-400 flex items-center gap-2">
                <i data-lucide="layout-dashboard"></i> PISA-DB
            </h1>
            <div class="h-6 w-px bg-gray-600 mx-2"></div>
            <!-- DROPDOWN SHEET -->
            <div class="flex items-center gap-2">
                <label for="sheetSelector" class="text-sm text-gray-400">Pilih Sheet:</label>
                <select id="sheetSelector" onchange="changeSheet()" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-64 p-2">
                    <option value="">Memuat data...</option>
                </select>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative w-64">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </span>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari data..." 
                       class="w-full bg-gray-700 border-none rounded-lg py-2 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 text-sm outline-none text-white">
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-y-auto p-6 space-y-6">
        
        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="flex flex-col items-center justify-center p-10 hidden">
            <i data-lucide="loader-2" class="w-10 h-10 text-blue-500 animate-spin mb-4"></i>
            <p class="text-gray-400">Memuat dan memproses file Excel...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-lg hidden">
            <h3 class="font-bold flex items-center gap-2"><i data-lucide="alert-triangle"></i> Gagal Memuat Data</h3>
            <p class="text-sm mt-1" id="errorText">Pastikan file 'DATA PISA MATEMATIKA1.xlsx' ada di folder yang sama.</p>
        </div>

        <!-- DIAGRAM CARDS -->
        <div id="dashboardContent" class="hidden flex-col gap-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-2" class="text-green-400"></i> Visualisasi Data (Top 10)
                </h3>
                <div class="w-full h-64">
                    <canvas id="dynamicChart"></canvas>
                </div>
            </div>

            <!-- DYNAMIC TABLE -->
            <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
                <div class="p-4 border-b border-gray-700 bg-gray-800 flex justify-between items-center">
                    <h3 class="text-lg font-semibold" id="tableTitle">Data Tabel</h3>
                </div>
                <div class="overflow-x-auto max-h-[500px]">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-gray-700/50 text-gray-400 text-xs uppercase sticky top-0 z-10" id="tableHead">
                            <!-- Header generated dynamically -->
                        </thead>
                        <tbody class="text-sm divide-y divide-gray-700" id="tableBody">
                            <!-- Data generated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let workbook = null;
        let currentData = [];
        let myChart = null;

        async function init() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('dashboardContent').classList.add('hidden');
            document.getElementById('errorMessage').classList.add('hidden');

            try {
                const response = await fetch('DATA PISA MATEMATIKA1.xlsx');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const arrayBuffer = await response.arrayBuffer();
                workbook = XLSX.read(arrayBuffer, { type: 'array' });
                
                // Populate Dropdown
                const selector = document.getElementById('sheetSelector');
                selector.innerHTML = ''; // clear options
                
                workbook.SheetNames.forEach((sheetName, index) => {
                    const option = document.createElement('option');
                    option.value = sheetName;
                    option.textContent = sheetName;
                    selector.appendChild(option);
                });

                // Load first sheet by default
                if(workbook.SheetNames.length > 0) {
                    changeSheet();
                }

                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
                document.getElementById('dashboardContent').classList.add('flex');

            } catch (error) {
                console.error("Error loading excel:", error);
                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorText').innerText = "Gagal memuat file 'DATA PISA MATEMATIKA1.xlsx'. Jika Anda mengakses via GitHub Pages, pastikan file tersebut sudah di-upload ke repository. (Error: " + error.message + ")";
            }
        }

        function changeSheet() {
            const sheetName = document.getElementById('sheetSelector').value;
            if(!sheetName || !workbook) return;

            document.getElementById('tableTitle').innerText = `Data Sheet: ${sheetName}`;
            
            const worksheet = workbook.Sheets[sheetName];
            // Convert to JSON array of objects
            currentData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
            
            renderTable(currentData);
            renderChart(currentData);
        }

        function renderTable(data) {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            
            thead.innerHTML = '';
            tbody.innerHTML = '';

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td class="p-4 text-center text-gray-400">Tidak ada data di sheet ini.</td></tr>';
                return;
            }

            // Generate Headers
            const keys = Object.keys(data[0]);
            const trHead = document.createElement('tr');
            keys.forEach(key => {
                const th = document.createElement('th');
                th.className = 'p-4 font-semibold tracking-wide';
                th.textContent = key;
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);

            // Generate Rows
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-700/30 transition';
                keys.forEach(key => {
                    const td = document.createElement('td');
                    td.className = 'p-4';
                    td.textContent = row[key];
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if(!currentData) return;

            const filteredData = currentData.filter(row => {
                return Object.values(row).some(val => 
                    String(val).toLowerCase().includes(query)
                );
            });
            renderTable(filteredData);
        }

        function renderChart(data) {
            if(myChart) myChart.destroy();
            if(data.length === 0) return;

            // Simple heuristic to find a label column (first string column) and a data column (first number column)
            const keys = Object.keys(data[0]);
            let labelKey = keys[0]; // default to first column
            let dataKeys = [];

            // Find all columns that have numbers in the first row
            keys.forEach(key => {
                if(typeof data[0][key] === 'number') {
                    dataKeys.push(key);
                }
            });

            // If no pure numbers found, try to find columns where values can be parsed as numbers
            if (dataKeys.length === 0 && data.length > 0) {
                keys.forEach(key => {
                     const val = parseFloat(data[0][key]);
                     if(!isNaN(val)) dataKeys.push(key);
                });
            }

            // Take top 10 for chart to avoid clutter
            const chartData = data.slice(0, 10);
            const labels = chartData.map(row => row[labelKey] || 'Unknown');
            
            const datasets = [];
            const colors = ['#60a5fa', '#f87171', '#34d399', '#fbbf24', '#a78bfa'];

            if (dataKeys.length > 0) {
                // Plot up to 3 numeric columns
                dataKeys.slice(0, 3).forEach((key, index) => {
                    datasets.push({
                        label: key,
                        data: chartData.map(row => parseFloat(row[key]) || 0),
                        backgroundColor: colors[index % colors.length],
                        borderColor: colors[index % colors.length],
                        borderWidth: 1
                    });
                });
            } else {
                // Dummy dataset if no numbers found
                datasets.push({
                    label: 'No Numeric Data Found',
                    data: chartData.map(() => 0)
                });
            }

            const ctx = document.getElementById('dynamicChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#9ca3af' } }
                    },
                    scales: {
                        y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } },
                        x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                    }
                }
            });
        }

        // Run
        init();
        lucide.createIcons();
    </script>
</body>
</html>
